name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels:
  - bug
assignees: []
body:
  - type: dropdown
    id: play_type
    attributes:
      label: Where did you find this bug?
      description: Choose where this issue happened.
      options:
        - Engine (inside Unreal Editor)
        - Build (packaged game)
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: The player gets stuck after ending a turn while standing on a relic tile.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Scroll down to ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos
      description: Add screenshots or videos to help explain your problem.
      placeholder: Paste image/video links or drag files into the issue after it is created.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
